<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VU Helping Desk | Education Reimagined</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vu-blue: #003366;
            --vu-light-blue: #00509d;
            --accent-gold: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: #f4f7f6;
            color: #333;
        }

        /* Gradient Header */
        header {
            background: linear-gradient(135deg, var(--vu-blue), var(--vu-light-blue));
            padding: 80px 20px;
            text-align: center;
            color: white;
            border-bottom: 5px solid var(--accent-gold);
            animation: fadeInDown 1s ease;
        }

        .container { max-width: 1000px; margin: -50px auto 50px; padding: 20px; }

        /* Card Section */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
            border-top: 4px solid var(--vu-light-blue);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .card h3 { margin-bottom: 15px; color: var(--vu-blue); }

        .btn {
            display: inline-block;
            padding: 10px 25px;
            background: var(--vu-blue);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn:hover { background: var(--accent-gold); color: #000; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>VU Helping Desk</h1>
        <p>Your Ultimate Partner in Virtual Learning Success</p>
    </header>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h3>Past Papers</h3>
                <p>Solved past papers of all subjects.</p>
                <a href="#" class="btn">View Now</a>
            </div>
            <div class="card">
                <h3>Handouts</h3>
                <p>Updated VU handouts in PDF format.</p>
                <a href="#" class="btn">Download</a>
            </div>
            <div class="card">
                <h3>Assignments</h3>
                <p>Get latest assignment solutions.</p>
                <a href="#" class="btn">Check Now</a>
            </div>
        </div>
    </div>

</body>
</html>

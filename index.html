<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vu Helping Desk</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vu-blue: #003366;
            --vu-light-blue: #00509d;
            --accent-gold: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: #f0f4f8;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, var(--vu-blue), var(--vu-light-blue));
            padding: 80px 20px;
            text-align: center;
            color: white;
            border-bottom: 5px solid var(--accent-gold);
        }

        .container { max-width: 900px; margin: -40px auto 50px; padding: 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: 0.3s;
            border-top: 5px solid var(--vu-light-blue);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .card h3 { margin-bottom: 15px; color: var(--vu-blue); font-size: 1.5rem; }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--vu-blue);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            margin-top: 15px;
        }

        .btn:hover { background: var(--accent-gold); color: #000; }
    </style>
</head>
<body>

    <header>
        <h1>VU Helping Desk</h1>
        <p>Premium Resources for All Subjects</p>
    </header>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h3>All Subjects Handouts</h3>
                <p>Download latest handouts for all VU courses in PDF format.</p>
                <a href="CS201_Handouts.pdf" class="btn">Download Now</a>
            </div>

            <div class="card">
                <h3>All Subjects Past Papers</h3>
                <p>Get solved mid-term and final-term past papers easily.</p>
                <a href="#" class="btn">Explore Papers</a>
            </div>
        </div>
    </div>

</body>
</html>
